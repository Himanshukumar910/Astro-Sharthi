<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Astro Sharthi Dashboard</title>
    <style>
        :root {
            --primary-red: #d32f2f;
            --festival-orange: #ff9800;
            --muhurat-brown: #f57600;
            --bg-cream: #f6f7fb;
            --text-dark: #333;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fdfbfb, #ebedee);
            margin: 0;
            color: var(--text-dark);
            position: relative;
        }

        /* --- HINDU ANIMATIONS & THEME --- */
        .header-section {
            text-align: center;
            padding: 70px 20px;
            background: linear-gradient(135deg, #8e2de2, #4a00e0);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .header-section::before {
            content: "☸";
            position: absolute;
            left: 8%;
            top: 20px;
            font-size: 50px;
            color: gold;
            animation: spinSlow 30s linear infinite;
        }

        .header-section::after {
            content: "ॐ";
            position: absolute;
            right: 8%;
            top: 20px;
            font-size: 50px;
            color: gold;
            animation: spinSlow 30s linear infinite reverse;
        }

        body::before {
            content: "ॐ";
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 90px;
            color: gold;
            opacity: 0.15;
            animation: floatOm 12s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        body::after {
            content: "🪔";
            position: fixed;
            bottom: 8%;
            right: 5%;
            font-size: 70px;
            opacity: 0.2;
            animation: floatDiya 10s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes spinSlow { from {transform:rotate(0deg);} to {transform:rotate(360deg);} }
        @keyframes floatOm { 0%{transform:translateY(0)} 50%{transform:translateY(-25px) rotate(8deg)} 100%{transform:translateY(0)} }
        @keyframes floatDiya { 0%{transform:translateY(0)} 50%{transform:translateY(-20px)} 100%{transform:translateY(0)} }

        /* --- BUTTONS & INTERFACE --- */
        #page-title { font-size: 42px; font-weight: 800; margin: 0; }
        
        .landing-container { display: flex; justify-content: center; gap: 25px; margin-top: 25px; flex-wrap: wrap; }
        
        .big-btn {
            padding: 18px 35px;
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .big-btn:hover { transform: translateY(-4px) scale(1.03); }
        .btn-m { background: linear-gradient(135deg, #d32f2f, #b71c1c); }
        .btn-f { background: linear-gradient(135deg, #ff9800, #ff5722); }

        #main-interface { display: none; margin-top: 30px; }

        .search-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            max-width: 1200px;
            margin: 0 auto 30px;
            padding: 25px;
            border-radius: 22px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.08);
            display: flex;
            gap: 18px;
            justify-content: center;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .input-group { display: flex; flex-direction: column; min-width: 180px; }
        .input-group label { font-size: 11px; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; color: #666; }
        .input-group select, .input-group input { padding: 12px; border: 1px solid #ddd; border-radius: 12px; outline: none; }

        /* --- CALENDAR & DAY CELLS --- */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .month-card {
            background: #fff;
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: 0.35s;
        }

        .month-title { font-weight: 800; font-size: 20px; margin-bottom: 15px; color: #4a00e0; text-align: center; }
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); font-size: 11px; color: #666; margin-bottom: 8px; font-weight: bold; text-align: center; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }

        .day {
            min-height: 65px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 5px;
            border-radius: 12px;
            font-size: 13px;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid #f0f0f0;
        }

        .day:hover { transform: scale(1.05); background: #f9f9f9; }
        .day b { font-size: 14px; }

        /* Label for text below dates */
        .day-event-label {
            font-size: 8px;
            line-height: 10px;
            text-align: center;
            margin-top: 5px;
            font-weight: 800;
            padding: 0 2px;
            text-transform: uppercase;
        }

        /* --- GLOW EFFECTS --- */
        .highlight-festival {
            background: linear-gradient(135deg, #ff9800, #ff5722) !important;
            color: #fff !important;
            animation: festivalGlow 2s infinite !important;
        }

        .highlight-muhurat {
            background: linear-gradient(135deg, #6d4c41, #4e342e) !important;
            color: #fff !important;
            animation: muhuratGlow 2s infinite !important;
        }

        @keyframes festivalGlow {
            0% { box-shadow: 0 0 5px #ff9800; }
            50% { box-shadow: 0 0 18px #ff9800, 0 0 30px #ff5722; }
            100% { box-shadow: 0 0 5px #ff9800; }
        }

        @keyframes muhuratGlow {
            0% { box-shadow: 0 0 5px #eb9c0a; }
            50% { box-shadow: 0 0 18px #eb9c0a, 0 0 30px #eb9c0a; }
            100% { box-shadow: 0 0 5px #eb9c0a; }
        }

        /* Coming Soon Section */
        .coming-soon-box {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 20px;
            background: white;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 800;
            color: #888;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 2px dashed #ddd;
        }

        /* Modal */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 25px; max-width: 650px; width: 92%; position: relative; }
        #modal-date { color: var(--primary-red) !important; font-size: 28px; font-weight: 800; }
        .modal-item { margin: 15px 0; padding: 15px; background: #fafafa; border-radius: 12px; border-left: 5px solid #8e2de2; }
        .modal-item strong { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 6px; }
        .close-modal { position: absolute; top: 15px; right: 18px; font-size: 30px; cursor: pointer; }
        /* FINAL MOBILE CALENDAR FIX */
@media (max-width: 600px){

    .calendar-grid{
        padding: 8px !important;
        gap: 16px !important;
    }

    .month-card{
        width: 100% !important;
        padding: 10px !important;
        border-radius: 20px !important;
    }

    .month-title{
        font-size: 24px !important;
        margin-bottom: 12px !important;
    }

    .days-header{
        font-size: 10px !important;
        margin-bottom: 4px !important;
    }

    .days-grid{
        gap: 3px !important;
    }

    .day{
        min-height: 48px !important;
        padding-top: 3px !important;
        border-radius: 14px !important;
    }

    .day b{
        font-size: 11px !important;
    }

    .day-event-label{
        font-size: 4px !important;
        line-height: 4.5px !important;
        margin-top: 2px !important;
    }

    .highlight-festival,
    .highlight-muhurat{
        box-shadow: 0 0 12px rgba(255,152,0,.35) !important;
    }
}
.highlight-festival,
.highlight-muhurat{
    min-height: 58px !important;
}

    </style>
</head>
<body>

    <div class="header-section">
        <h1 id="page-title">Shubh Muhurat & Festivals</h1>
        <div class="landing-container" id="landing-buttons">
            <button class="big-btn btn-m" onclick="initInterface('muhurat')">Shubh Muhurat</button>
            <button class="big-btn btn-f" onclick="initInterface('festival')">Festivals</button>
        </div>
    </div>

    <div id="main-interface">
        <div class="search-container">
            <div class="input-group">
                <label>Find Date</label>
                <input type="date" id="date-search-input" onchange="searchSpecificDate()">
            </div>
            <div class="input-group" id="cat-group">
                <label>Category</label>
                <select id="category" onchange="loadData()">
                    <option value="Marriage">Marriage</option>
                    <option value="Business">New Business</option>
                    <option value="Mundan">Mundan</option>
                    <option value="Ring">Engagement/Ring</option>
                    <option value="Vehicle">Vehicle</option>
                    <option value="Naming">Naam Karan</option>
                    <option value="Grih">Grih Pravesh</option>
                    <option value="Property">Property Purchase</option>
                </select>
            </div>
            <div class="input-group">
                <label>Year</label>
                <select id="year" onchange="loadData()"></select>
            </div>
            <button class="big-btn btn-f" id="switch-btn" style="padding: 10px 20px; font-size: 12px;" onclick="toggleMode()">View Festivals</button>
        </div>
        <div class="calendar-grid" id="calendar-container"></div>
    </div>

    <div id="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-date" style="margin-top:0;">Details</h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let currentMode = 'muhurat';
        let serverData = {};

        function updateYearOptions() {
            const yearDropdown = document.getElementById('year');
            yearDropdown.innerHTML = '';
            const years = (currentMode === 'festival') ? [2026, 2027, 2028, 2029, 2030, 2031] : [2027, 2028];
            years.forEach(y => {
                let opt = document.createElement('option');
                opt.value = y; opt.text = y;
                yearDropdown.appendChild(opt);
            });
        }

        function initInterface(mode) {
            currentMode = mode;
            document.getElementById('landing-buttons').style.display = 'none';
            document.getElementById('main-interface').style.display = 'block';
            updateYearOptions();
            loadData();
        }

        function toggleMode() {
            currentMode = (currentMode === 'muhurat') ? 'festival' : 'muhurat';
            document.getElementById('switch-btn').innerText = (currentMode === 'muhurat') ? "View Festivals" : "View Muhurats";
            updateYearOptions();
            loadData();
        }

        async function loadData() {
            const year = document.getElementById('year').value;
            const cat = document.getElementById('category').value;
            const container = document.getElementById('calendar-container');

            // Requirement: Coming Soon for Business 2028
            if (currentMode === 'muhurat' && cat === 'Business' && year === '2028') {
                document.getElementById('page-title').innerText = `New Business Muhurat 2028`;
                container.innerHTML = `<div class="coming-soon-box">🕉️ Data will be uploaded soon for 2028 Business Muhurats.</div>`;
                return;
            }

            let url = (currentMode === 'muhurat') ? `/api/muhurat?year=${year}&category=${cat}` : `/api/festivals?year=${year}`;
            const response = await fetch(url);
            serverData = await response.json();

            document.getElementById('page-title').innerText = (currentMode === 'muhurat') ? `${cat} Muhurat ${year}` : `Festivals ${year}`;
            document.getElementById('cat-group').style.display = (currentMode === 'muhurat') ? "flex" : "none";
            renderCalendars(year);
        }

        async function searchSpecificDate() {
            const dateInput = document.getElementById('date-search-input').value;
            if (!dateInput) return;
            const year = dateInput.split('-')[0];
            document.getElementById('year').value = year;
            await loadData();
            showDetails(dateInput);
        }

        function renderCalendars(year) {
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            let html = '';
            months.forEach((m, i) => {
                html += `<div class="month-card">
                    <div class="month-title">${m} ${year}</div>
                    <div class="days-header"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
                    <div class="days-grid">${generateDays(year, i)}</div>
                </div>`;
            });
            document.getElementById('calendar-container').innerHTML = html;
        }

        function generateDays(year, month) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = '';
            for (let i = 0; i < firstDay; i++) html += `<div class="day" style="border:none; cursor:default"></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                let highlight = '';
                let label = '';
                if (serverData[dateStr]) {
                    highlight = (currentMode === 'muhurat') ? 'highlight-muhurat' : 'highlight-festival';
                    label = `<div class="day-event-label">${(currentMode === 'festival') ? serverData[dateStr].name : "Subh Muhurat"}</div>`;
                }
                html += `<div class="day ${highlight}" onclick="showDetails('${dateStr}')"><b>${d}</b>${label}</div>`;
            }
            return html;
        }

        function showDetails(dateStr) {
            const d = serverData[dateStr];
            const body = document.getElementById('modal-body');
            document.getElementById('modal-date').innerText = dateStr;
            if (!d) {
                body.innerHTML = `<div style="text-align:center; padding:20px;">No events found on this date.</div>`;
            } else {
                if (currentMode === 'festival') {
                    body.innerHTML = `<div class="modal-item"><strong>Festival</strong>${d.name}</div><div class="modal-item"><strong>Tithi</strong>${d.tithi}</div><div class="modal-item"><strong>Details</strong>${d.info}</div>`;
                } else {
                    body.innerHTML = `
<div class="modal-item"><strong>Time</strong>${d.timing}</div>
<div class="modal-item"><strong>Duration</strong>${d.duration} Minutes</div>
<div class="modal-item"><strong>Nakshatra</strong>${d.nakshatra}</div>
<div class="modal-item"><strong>Yoga 1</strong>${d.yoga1}</div>
<div class="modal-item"><strong>Yoga 2</strong>${d.yoga2}</div>`;
                }
            }
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    </script>
</body>
</html>
